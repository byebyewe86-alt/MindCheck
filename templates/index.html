<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" 
          content="width=device-width, 
                   initial-scale=1.0">
    <title>MindCheck — Your Safe Space</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Arial,
                         sans-serif;
            background: #0f0f1a;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 700px;
            height: 90vh;
            display: flex;
            flex-direction: column;
            background: #1a1a2e;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 20px 60px
                        rgba(0,0,0,0.5);
        }

        /* HEADER */
        .header {
            background: #16213e;
            padding: 20px 25px;
            border-bottom: 1px solid #2a2a4a;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header-left h1 {
            color: #7c6fcd;
            font-size: 1.4rem;
        }

        .header-left p {
            color: #666;
            font-size: 0.8rem;
            margin-top: 3px;
        }

        .reset-btn {
            background: transparent;
            border: 1px solid #333;
            color: #666;
            padding: 6px 12px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.8rem;
        }

        .reset-btn:hover {
            border-color: #7c6fcd;
            color: #7c6fcd;
        }

        /* CHAT AREA */
        .chat-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .chat-area::-webkit-scrollbar {
            width: 4px;
        }

        .chat-area::-webkit-scrollbar-thumb {
            background: #333;
            border-radius: 2px;
        }

        /* MESSAGES */
        .message {
            display: flex;
            gap: 10px;
            max-width: 85%;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user {
            align-self: flex-end;
            flex-direction: row-reverse;
        }

        .message.bot {
            align-self: flex-start;
        }

        .avatar {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            flex-shrink: 0;
        }

        .bot .avatar {
            background: #7c6fcd;
        }

        .user .avatar {
            background: #2a4a7a;
        }

        .bubble {
            padding: 12px 16px;
            border-radius: 16px;
            font-size: 0.9rem;
            line-height: 1.6;
            color: #e0e0e0;
        }

        .bot .bubble {
            background: #16213e;
            border-bottom-left-radius: 4px;
        }

        .user .bubble {
            background: #2a4a7a;
            border-bottom-right-radius: 4px;
            color: white;
        }

        /* TYPING INDICATOR */
        .typing {
            display: flex;
            gap: 4px;
            padding: 12px 16px;
            background: #16213e;
            border-radius: 16px;
            border-bottom-left-radius: 4px;
            width: fit-content;
        }

        .typing span {
            width: 8px;
            height: 8px;
            background: #7c6fcd;
            border-radius: 50%;
            animation: bounce 1.2s infinite;
        }

        .typing span:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing span:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes bounce {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-8px); }
        }

        /* INPUT AREA */
        .input-area {
            padding: 15px 20px;
            background: #16213e;
            border-top: 1px solid #2a2a4a;
            display: flex;
            gap: 10px;
            align-items: flex-end;
        }

        textarea {
            flex: 1;
            background: #0f0f1a;
            border: 1px solid #2a2a4a;
            border-radius: 12px;
            padding: 12px 15px;
            color: white;
            font-size: 0.9rem;
            font-family: inherit;
            resize: none;
            max-height: 120px;
            min-height: 45px;
            outline: none;
            line-height: 1.5;
        }

        textarea:focus {
            border-color: #7c6fcd;
        }

        textarea::placeholder {
            color: #444;
        }

        .send-btn {
            width: 45px;
            height: 45px;
            background: #7c6fcd;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            flex-shrink: 0;
            transition: background 0.2s;
        }

        .send-btn:hover {
            background: #6a5cb8;
        }

        .send-btn:disabled {
            background: #333;
            cursor: not-allowed;
        }

        /* FOOTER */
        .footer {
            text-align: center;
            padding: 8px;
            color: #333;
            font-size: 0.75rem;
            background: #16213e;
        }

        /* WELCOME MESSAGE */
        .welcome {
            text-align: center;
            padding: 30px 20px;
            color: #555;
        }

        .welcome h2 {
            color: #7c6fcd;
            margin-bottom: 10px;
            font-size: 1.1rem;
        }

        .welcome p {
            font-size: 0.85rem;
            line-height: 1.6;
        }
    </style>
</head>
<body>
<div class="container">

    <!-- HEADER -->
    <div class="header">
        <div class="header-left">
            <h1>🧠 MindCheck</h1>
            <p>Your private safe space —
               always here to listen</p>
        </div>
        <button class="reset-btn"
                onclick="resetChat()">
            New Chat
        </button>
    </div>

    <!-- CHAT AREA -->
    <div class="chat-area" id="chatArea">
        <div class="welcome">
            <h2>Hey, I'm Yumila 👋</h2>
            <p>I'm here to listen — no judgment,
               no advice unless you want it.<br>
               Just tell me how you're feeling today.
               <br><br>
               <em style="color:#444;">
               Everything you share stays private.
               </em>
            </p>
        </div>
    </div>

    <!-- INPUT AREA -->
    <div class="input-area">
        <textarea
            id="userInput"
            placeholder="How are you feeling today..."
            rows="1"
            onkeydown="handleKey(event)"
            oninput="autoResize(this)">
        </textarea>
        <button class="send-btn"
                id="sendBtn"
                onclick="sendMessage()">
            ➤
        </button>
    </div>

    <!-- FOOTER -->
    <div class="footer">
        MindCheck · Private & Confidential ·
        Crisis helpline: iCall 9152987821
    </div>

</div>

<script>
    function autoResize(textarea) {
        textarea.style.height = 'auto';
        textarea.style.height =
            Math.min(textarea.scrollHeight, 120) + 'px';
    }

    function handleKey(event) {
        if (event.key === 'Enter' &&
            !event.shiftKey) {
            event.preventDefault();
            sendMessage();
        }
    }

    function addMessage(text, sender) {
        const chatArea = document.getElementById(
            'chatArea'
        );

        const msgDiv = document.createElement('div');
        msgDiv.className = `message ${sender}`;

        const avatar = document.createElement('div');
        avatar.className = 'avatar';
        avatar.textContent = sender === 'bot'
            ? '🧠' : '👤';

        const bubble = document.createElement('div');
        bubble.className = 'bubble';
        bubble.textContent = text;

        msgDiv.appendChild(avatar);
        msgDiv.appendChild(bubble);
        chatArea.appendChild(msgDiv);

        chatArea.scrollTop = chatArea.scrollHeight;
    }

    function showTyping() {
        const chatArea = document.getElementById(
            'chatArea'
        );
        const typing = document.createElement('div');
        typing.className = 'message bot';
        typing.id = 'typing';
        typing.innerHTML = `
            <div class="avatar">🧠</div>
            <div class="typing">
                <span></span>
                <span></span>
                <span></span>
            </div>
        `;
        chatArea.appendChild(typing);
        chatArea.scrollTop = chatArea.scrollHeight;
    }

    function removeTyping() {
        const typing = document.getElementById(
            'typing'
        );
        if (typing) typing.remove();
    }

    async function sendMessage() {
        const input = document.getElementById(
            'userInput'
        );
        const sendBtn = document.getElementById(
            'sendBtn'
        );
        const message = input.value.trim();

        if (!message) return;

        // Clear welcome message
        const welcome = document.querySelector(
            '.welcome'
        );
        if (welcome) welcome.remove();

        // Show user message
        addMessage(message, 'user');

        // Clear input
        input.value = '';
        input.style.height = 'auto';
        sendBtn.disabled = true;

        // Show typing
        showTyping();

        try {
            const response = await fetch('/chat', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    message: message
                })
            });

            const data = await response.json();
            removeTyping();
            addMessage(data.response, 'bot');

        } catch (error) {
            removeTyping();
            addMessage(
                "Something went wrong. Please try again.",
                'bot'
            );
        }

        sendBtn.disabled = false;
        input.focus();
    }

    async function resetChat() {
        await fetch('/reset', { method: 'POST' });

        const chatArea = document.getElementById(
            'chatArea'
        );
        chatArea.innerHTML = `
            <div class="welcome">
                <h2>Hey, I'm Mindi 👋</h2>
                <p>I'm here to listen — no judgment,
                   no advice unless you want it.<br>
                   Just tell me how you're feeling today.
                   <br><br>
                   <em style="color:#444;">
                   Everything you share stays private.
                   </em>
                </p>
            </div>
        `;
    }
</script>

</body>
</html>
